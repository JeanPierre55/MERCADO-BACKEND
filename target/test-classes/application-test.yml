server:
  port: 8080

spring:
  application:
    name: pos-mercato-backend-test
  datasource:
    url: jdbc:h2:mem:posdb-test
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: pos-mercato-secret-key-256-bits-minimum
  expiration-ms: 86400000

product-api:
  base-url: http://localhost:8888
  timeout-ms: 5000

customer-api:
  base-url: http://localhost:8889
  timeout-ms: 5000

pos:
  tax-rate: 0.19
  frozen-sale-expiration-hours: 2
  frozen-sale-check-interval-ms: 300000
