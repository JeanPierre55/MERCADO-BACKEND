server:
  port: 8080

spring:
  application:
    name: pos-mercato-backend
  datasource:
    url: jdbc:h2:mem:posdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:pos-mercato-secret-key-256-bits-minimum}
  expiration-ms: 86400000  # 24 hours in milliseconds

product-api:
  base-url: ${PRODUCT_API_URL:http://localhost:8081}
  timeout-ms: 5000

customer-api:
  base-url: ${CUSTOMER_API_URL:http://localhost:8082}
  timeout-ms: 5000

pos:
  tax-rate: 0.19
  frozen-sale-expiration-hours: 2
  frozen-sale-check-interval-ms: 300000  # 5 minutes in milliseconds

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
